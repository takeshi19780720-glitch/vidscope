services:
  - type: web
    runtime: docker
    name: vidscope
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: YOUTUBE_API_KEY
        sync: false  # Render管理画面で手動設定
      - key: ADMIN_PASSWORD
        sync: false  # Render管理画面で手動設定
      - key: SUPABASE_URL
        sync: false  # Render管理画面で手動設定
      - key: SUPABASE_KEY
        sync: false  # Render管理画面で手動設定
    healthCheckPath: /
    autoDeploy: true
