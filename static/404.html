<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - ページが見つかりません | YouTube Research</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Roboto", sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .error-container {
      text-align: center;
      padding: 40px 24px;
    }
    .error-code {
      font-size: 96px;
      font-weight: 700;
      color: #ff0000;
      line-height: 1;
      margin: 0 0 16px;
    }
    .error-title {
      font-size: 24px;
      font-weight: 500;
      margin: 0 0 12px;
    }
    .error-message {
      font-size: 16px;
      color: #aaa;
      margin: 0 0 32px;
    }
    .home-link {
      display: inline-block;
      padding: 12px 28px;
      background: #ff0000;
      color: #fff;
      text-decoration: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .home-link:hover { background: #cc0000; }
  </style>
</head>
<body>
  <div class="error-container">
    <p class="error-code">404</p>
    <h1 class="error-title">ページが見つかりません</h1>
    <p class="error-message">お探しのページは存在しないか、移動した可能性があります。</p>
    <a href="/" class="home-link">トップページへ戻る</a>
  </div>
</body>
</html>
