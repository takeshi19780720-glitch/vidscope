<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n-doctitle="contact.docTitle">お問い合わせ | VidScope</title>
<link rel="canonical" href="https://vidscope.app/contact" />
<link rel="alternate" hreflang="ja" href="https://vidscope.app/contact" />
<link rel="alternate" hreflang="en" href="https://vidscope.app/contact?lang=en" />
<link rel="alternate" hreflang="ko" href="https://vidscope.app/contact?lang=ko" />
<link rel="alternate" hreflang="zh" href="https://vidscope.app/contact?lang=zh" />
<link rel="alternate" hreflang="x-default" href="https://vidscope.app/contact" />
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="/static/favicon-192.png">
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="/static/i18n/i18n.js"></script>
<style>
:root { --bg: #111; --text: #e0e0e0; --heading: #fff; --accent: #e53935; --card-bg: #1a1a1a; --border: #333; --link: #ef5350; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.8; }
.header { display: flex; justify-content: space-between; align-items: center; height: 64px; padding: 0 40px; border-bottom: 1px solid rgba(255,255,255,0.06); background: rgba(15,15,15,0.85); line-height: 1.6; }
.header a { color: #f1f1f1; text-decoration: none; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
.header a span { color: #ff0000; }
.lang-switcher { position: relative; }
.lang-switcher-btn { background: none; border: none; color: var(--text); font-size: 13px; font-weight: 700; cursor: pointer; padding: 6px 8px; border-radius: 6px; line-height: 1; }
.lang-switcher-menu { display: none; position: absolute; top: 100%; right: 0; margin-top: 4px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; z-index: 1200; min-width: 150px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.lang-switcher-menu.open { display: block; }
.lang-option { display: block; width: 100%; text-align: left; background: none; border: none; color: var(--text); font-size: 13px; padding: 8px 12px; cursor: pointer; white-space: nowrap; }
.lang-option.active { color: var(--link); font-weight: 700; }
.lang-flag { display: inline-block; }
.lang-name { display: inline; }
@media (max-width: 600px) {
  .lang-switcher-btn .lang-name { display: none; }
  .lang-option .lang-name { display: inline; }
  .lang-option { padding: 10px 12px; font-size: 16px; text-align: left; }
}
.container { max-width: 600px; margin: 0 auto; padding: 48px 24px 80px; }
h1 { color: var(--heading); font-size: 28px; margin-bottom: 8px; }
.subtitle { color: #999; font-size: 14px; margin-bottom: 40px; }
label { display: block; color: var(--heading); font-size: 14px; font-weight: 600; margin-bottom: 6px; margin-top: 20px; }
input, textarea, select {
  width: 100%; padding: 12px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--card-bg); color: var(--text);
  font-size: 15px; font-family: inherit; transition: border-color 0.2s;
}
input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
textarea { resize: vertical; min-height: 140px; }
select option { background: var(--card-bg); color: var(--text); }
.required { color: var(--accent); }
.submit-btn {
  display: block; width: 100%; margin-top: 32px; padding: 14px;
  background: var(--accent); color: #fff; border: none; border-radius: 8px;
  font-size: 16px; font-weight: 700; cursor: pointer; transition: background 0.2s;
}
.submit-btn:hover { background: #c62828; }
.submit-btn:disabled { background: #555; cursor: not-allowed; }
.success-msg {
  display: none; text-align: center; padding: 40px 20px;
  background: var(--card-bg); border-radius: 12px; margin-top: 20px;
}
.success-msg h2 { color: #4caf50; margin-bottom: 12px; }
.success-msg p { color: var(--text); }
.footer { text-align: center; padding: 24px; color: #666; font-size: 13px; border-top: 1px solid var(--border); }
.footer a { color: var(--link); text-decoration: none; margin: 0 12px; }
</style>
</head>
<body>
<div class="header">
  <a href="/"><img src="/static/logo-header-dark.png" alt="VidScope" height="30" width="auto"></a>
  <div class="lang-switcher">
    <button type="button" class="lang-switcher-btn" title="Language / 言語"><span data-lang-current><span class="lang-flag">🇯🇵</span><span class="lang-name"> 日本語</span></span></button>
    <div class="lang-switcher-menu">
      <button type="button" class="lang-option" data-lang="ja"><span class="lang-flag">🇯🇵</span><span class="lang-name"> 日本語</span></button>
      <button type="button" class="lang-option" data-lang="en"><span class="lang-flag">🇺🇸</span><span class="lang-name"> English</span></button>
      <button type="button" class="lang-option" data-lang="ko"><span class="lang-flag">🇰🇷</span><span class="lang-name"> 한국어</span></button>
      <button type="button" class="lang-option" data-lang="zh"><span class="lang-flag">🇨🇳</span><span class="lang-name"> 中文（简体）</span></button>
    </div>
  </div>
</div>

<div class="container">
  <div id="form-section">
    <h1 data-i18n="contact.heading">お問い合わせ</h1>
    <p class="subtitle" data-i18n="contact.subtitle">ご質問、ご要望、データ削除リクエストなど、お気軽にお問い合わせください。</p>

    <form id="contact-form">
      <label><span data-i18n="contact.nameLabel">お名前</span> <span class="required">*</span></label>
      <input type="text" id="contact-name" required data-i18n-placeholder="contact.namePlaceholder" placeholder="山田 太郎">

      <label><span data-i18n="contact.emailLabel">メールアドレス</span> <span class="required">*</span></label>
      <input type="email" id="contact-email" required data-i18n-placeholder="contact.emailPlaceholder" placeholder="example@email.com">

      <label><span data-i18n="contact.categoryLabel">カテゴリ</span> <span class="required">*</span></label>
      <select id="contact-category" required>
        <option value="" data-i18n="contact.categoryPlaceholder">選択してください</option>
        <option value="general" data-i18n="contact.categoryGeneral">一般的なお問い合わせ</option>
        <option value="bug" data-i18n="contact.categoryBug">不具合の報告</option>
        <option value="feature" data-i18n="contact.categoryFeature">機能のリクエスト</option>
        <option value="data-deletion" data-i18n="contact.categoryDataDeletion">データ削除リクエスト</option>
        <option value="privacy" data-i18n="contact.categoryPrivacy">プライバシーに関する質問</option>
        <option value="other" data-i18n="contact.categoryOther">その他</option>
      </select>

      <label><span data-i18n="contact.messageLabel">お問い合わせ内容</span> <span class="required">*</span></label>
      <textarea id="contact-message" required data-i18n-placeholder="contact.messagePlaceholder" placeholder="お問い合わせ内容をご記入ください..."></textarea>

      <button type="submit" class="submit-btn" id="submit-btn" data-i18n="contact.submitBtn">送信する</button>
    </form>
  </div>

  <div class="success-msg" id="success-msg">
    <h2 data-i18n="contact.successHeading">✓ 送信完了</h2>
    <p data-i18n-html="contact.successMessage">お問い合わせありがとうございます。<br>内容を確認の上、ご連絡いたします。</p>
    <p style="margin-top: 20px;"><a href="/" style="color: var(--accent);" data-i18n="contact.backToTop">トップページに戻る</a></p>
  </div>
</div>

<div class="footer">
  <a href="/" data-i18n="common.footer.home">VidScope</a> |
  <a href="/privacy" data-i18n="common.footer.privacy">プライバシーポリシー</a> |
  <a href="/terms" data-i18n="common.footer.terms">利用規約</a> |
  <a href="/app" data-i18n="common.footer.app">アプリを使う</a>
</div>

<script>
document.getElementById('contact-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const t = window.VidScopeI18n ? window.VidScopeI18n.t : (k) => k;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = t('contact.submittingBtn');

  const data = {
    name: document.getElementById('contact-name').value,
    email: document.getElementById('contact-email').value,
    category: document.getElementById('contact-category').value,
    message: document.getElementById('contact-message').value
  };

  try {
    const res = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    if (res.ok) {
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('success-msg').style.display = 'block';
    } else {
      alert(t('contact.submitFailed'));
      btn.disabled = false;
      btn.textContent = t('contact.submitBtn');
    }
  } catch (err) {
    alert(t('contact.submitFailed'));
    btn.disabled = false;
    btn.textContent = t('contact.submitBtn');
  }
});
</script>
</body>
</html>
