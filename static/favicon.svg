<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1744"/>
      <stop offset="100%" style="stop-color:#e53935"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Magnifying glass circle (scope) -->
  <circle cx="230" cy="230" r="120" fill="none" stroke="url(#accent)" stroke-width="36"/>
  <!-- Magnifying glass handle -->
  <line x1="315" y1="315" x2="410" y2="410" stroke="url(#accent)" stroke-width="36" stroke-linecap="round"/>
  <!-- Play triangle inside the magnifying glass (vid) -->
  <polygon points="200,170 200,290 295,230" fill="#ffffff"/>
</svg>
